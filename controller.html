<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Battle Controller</title>
    <style>
        body { background: #1a2a3a; color: white; font-family: sans-serif; text-align: center; margin-top: 50px; }
        input, button { padding: 15px; font-size: 20px; border-radius: 10px; margin: 10px; border: none; }
        .btn { background: #00b4d8; color: white; cursor: pointer; font-weight: bold; width: 80%; max-width: 300px; }
        .btn:active { transform: scale(0.95); }
        .player-name-display { font-size: 24px; color: #48cae4; margin-bottom: 20px; }
        .meme-option { width: 80%; max-width: 250px; border: 4px solid transparent; border-radius: 10px; cursor: pointer; margin-bottom: 15px; transition: 0.2s;}
        .meme-option:active { border-color: #00b4d8; transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="setupScreen">
        <h2>JOIN GAME</h2>
        <input type="text" id="nameInput" placeholder="ENTER NICKNAME" maxlength="12">
        <br>
        <button id="connectBtn" class="btn" onclick="connectToServer()">JOIN</button>
    </div>

    <div id="gameScreen" style="display: none;">
        <div class="player-name-display" id="playerNameDisplay"></div>
        <h2 id="waitingMessage">Waiting for Host to start the game...</h2>
        
        <div id="imageScreen" style="display: none;">
            <h3>Pick your template!</h3>
            <img src="https://placehold.co/300x300/444444/FFF?text=Meme+1" class="meme-option" onclick="pickImage(this.src)">
            <img src="https://placehold.co/300x300/666666/FFF?text=Meme+2" class="meme-option" onclick="pickImage(this.src)">
            <img src="https://placehold.co/300x300/888888/FFF?text=Meme+3" class="meme-option" onclick="pickImage(this.src)">
        </div>

        <div id="captionScreen" style="display: none;">
            <h3>Write your best joke!</h3>
            <img id="captionImage" src="" style="width: 80%; max-width: 250px; border-radius: 10px; margin-bottom: 10px;">
            <br>
            <input type="text" id="topTextInput" placeholder="TOP TEXT" maxlength="30" style="width: 80%;">
            <br>
            <input type="text" id="bottomTextInput" placeholder="BOTTOM TEXT" maxlength="30" style="width: 80%;">
            <br>
            <button class="btn" onclick="submitMeme()">FINISH</button>
        </div>
    </div>

    <script>
        // ⚠️ YOUR PERMANENT SERVER LINK ⚠️
        const SERVER_URL = "wss://game.shalomuwu.com";

        let socket;
        let playerName = "";
        let selectedImage = "";

        function connectToServer() {
            playerName = document.getElementById("nameInput").value.trim();
            if (playerName === "") playerName = "Ghost_" + Math.floor(Math.random() * 1000);

            document.getElementById("connectBtn").innerText = "CONNECTING...";
            socket = new WebSocket(SERVER_URL);

            socket.onopen = function() {
                document.getElementById("setupScreen").style.display = "none";
                document.getElementById("gameScreen").style.display = "block";
                document.getElementById("playerNameDisplay").innerText = "Playing as: " + playerName;
                socket.send("JOIN," + playerName);
            };

            socket.onmessage = async function(event) {
                let message = event.data;
                if (message instanceof Blob) { message = await message.text(); }

                if (message === "START_GAME") {
                    document.getElementById("waitingMessage").style.display = "none";
                    document.getElementById("imageScreen").style.display = "block";
                }
                
                // NEW: IF GODOT SAYS "CAPTION", SHOW THE TEXT BOXES!
                if (message.startsWith("CAPTION,")) {
                    let parts = message.split(",");
                    selectedImage = parts[1]; // Save the image URL

                    // Hide Phase 1
                    document.getElementById("waitingMessage").style.display = "none";
                    document.getElementById("imageScreen").style.display = "none";

                    // Show Phase 2
                    document.getElementById("captionScreen").style.display = "block";
                    document.getElementById("captionImage").src = selectedImage; // Put the image on screen
                }
            };

            socket.onclose = function() {
                alert("Disconnected from server.");
                document.getElementById("setupScreen").style.display = "block";
                document.getElementById("gameScreen").style.display = "none";
                document.getElementById("connectBtn").innerText = "JOIN";
            };
        }

        function pickImage(imgUrl) {
            socket.send("PICKED," + playerName + "," + imgUrl);
            document.getElementById("imageScreen").style.display = "none";
            document.getElementById("waitingMessage").innerText = "Great choice! Waiting for Host...";
            document.getElementById("waitingMessage").style.display = "block";
        }

        // NEW: SEND THE FINISHED JOKE TO GODOT
        function submitMeme() {
            let topText = document.getElementById("topTextInput").value.trim();
            let bottomText = document.getElementById("bottomTextInput").value.trim();
            
            // Clean up commas so we don't break the server data
            topText = topText.replace(/,/g, ""); 
            bottomText = bottomText.replace(/,/g, "");

            socket.send("SUBMIT_MEME," + playerName + "," + topText + "," + bottomText + "," + selectedImage);
            
            document.getElementById("captionScreen").style.display = "none";
            document.getElementById("waitingMessage").innerText = "Joke submitted! Waiting for other players...";
            document.getElementById("waitingMessage").style.display = "block";
        }
    </script>
</body>
</html>
