<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Battle Controller</title>
    <style>
        body { background: #1a2a3a; color: white; font-family: sans-serif; text-align: center; margin-top: 50px; }
        input, button { padding: 15px; font-size: 20px; border-radius: 10px; margin: 10px; border: none; }
        .btn { background: #00b4d8; color: white; cursor: pointer; font-weight: bold; width: 80%; max-width: 300px; }
        .btn:active { transform: scale(0.95); }
        #buzzBtn { background: #ff4b2b; padding: 40px; font-size: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        #gameScreen { display: none; }
        .player-name-display { font-size: 24px; color: #48cae4; margin-bottom: 30px; }
    </style>
</head>
<body>

    <div id="setupScreen">
        <h2>JOIN GAME</h2>
        <input type="text" id="nameInput" placeholder="ENTER NICKNAME" maxlength="12">
        <br>
        <button id="connectBtn" class="btn" onclick="connectToServer()">JOIN</button>
    </div>

    <div id="gameScreen">
        <div class="player-name-display" id="playerNameDisplay"></div>
        <h2 id="waitingMessage">Waiting for Host to start the game...</h2>
        <button id="buzzBtn" class="btn" style="display: none;" onclick="sendBuzzer()">BUZZ IN!</button>
    </div>

    <script>
        // ⚠️ PASTE YOUR DAILY CLOUDFLARE WSS LINK RIGHT HERE ⚠️
        const SERVER_URL = "wss://aluminum-hospitality-forms-prisoners.trycloudflare.com";

        let socket;
        let playerName = "";

        function connectToServer() {
            // 1. Grab the name
            playerName = document.getElementById("nameInput").value.trim();
            if (playerName === "") {
                playerName = "Ghost_" + Math.floor(Math.random() * 1000);
            }

            document.getElementById("connectBtn").innerText = "CONNECTING...";

            // 2. Open the Tunnel to Godot
            socket = new WebSocket(SERVER_URL);

            // 3. When Godot opens the door
            socket.onopen = function() {
                console.log("Connected to Godot!");
                
                // Hide Setup, Show Game Screen
                document.getElementById("setupScreen").style.display = "none";
                document.getElementById("gameScreen").style.display = "block";
                document.getElementById("playerNameDisplay").innerText = "Playing as: " + playerName;

                // Tell Godot we joined
                socket.send("JOIN," + playerName);
            };
			socket.onmessage = function(event) {
            let message = event.data;
            console.log("Godot says: " + message);

            // If Godot yells START_GAME, switch the UI!
            if (message === "START_GAME") {
                document.getElementById("waitingMessage").style.display = "none";
                document.getElementById("buzzBtn").style.display = "inline-block";
            }
        };

            // 4. If the tunnel breaks
            socket.onclose = function() {
                alert("Disconnected from server.");
                document.getElementById("setupScreen").style.display = "block";
                document.getElementById("gameScreen").style.display = "none";
                document.getElementById("connectBtn").innerText = "JOIN";
            };
        }

        // 5. When they hit the buzzer
        function sendBuzzer() {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send("BUZZ," + playerName);
            }
        }
    </script>
</body>
</html>
